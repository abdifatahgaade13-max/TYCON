<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Support – Your Autonomous Customer Support Agent</title>
    <style>
        /* ===== RESET & BASE ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f8fafc;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #1e293b;
        }

        /* ===== APP CONTAINER ===== */
        .app {
            width: 100%;
            max-width: 520px;
            height: 90vh;
            background: #ffffff;
            border-radius: 32px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.08);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 1px solid #f1f5f9;
            position: relative;
        }

        /* ===== HEADER ===== */
        .header {
            padding: 20px 24px;
            border-bottom: 1px solid #f1f5f9;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #ffffff;
            flex-shrink: 0;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .avatar {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-weight: 700;
            font-size: 18px;
        }

        .header-title {
            font-weight: 600;
            font-size: 16px;
            line-height: 1.2;
        }

        .header-title span {
            font-weight: 400;
            color: #94a3b8;
            font-size: 12px;
            display: block;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            font-weight: 500;
            color: #22c55e;
            background: #f0fdf4;
            padding: 4px 12px;
            border-radius: 20px;
        }

        .status-badge .dot {
            width: 6px;
            height: 6px;
            background: #22c55e;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%,
            100% {
                opacity: 1;
            }
            50% {
                opacity: 0.3;
            }
        }

        /* ===== MESSAGES AREA ===== */
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            background: #fafbfc;
        }

        /* ===== MESSAGE BUBBLES ===== */
        .message {
            max-width: 88%;
            padding: 14px 18px;
            border-radius: 16px;
            font-size: 14px;
            line-height: 1.6;
            animation: fadeUp 0.3s ease;
            word-break: break-word;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(8px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            align-self: flex-end;
            background: #3b82f6;
            color: #ffffff;
            border-bottom-right-radius: 4px;
        }

        .message.bot {
            align-self: flex-start;
            background: #ffffff;
            color: #1e293b;
            border: 1px solid #e2e8f0;
            border-bottom-left-radius: 4px;
        }

        .message.bot .meta {
            font-size: 11px;
            color: #94a3b8;
            margin-top: 6px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .message.bot .meta .tag {
            background: #f1f5f9;
            padding: 0 8px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: 500;
            color: #475569;
        }

        .message.bot .bot-name {
            font-weight: 600;
            color: #3b82f6;
            font-size: 13px;
            margin-bottom: 4px;
            display: block;
        }

        /* ===== TICKET CLASSIFICATION CARD ===== */
        .ticket-card {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            padding: 16px;
            margin-top: 8px;
            font-size: 13px;
        }

        .ticket-card .row {
            display: flex;
            justify-content: space-between;
            padding: 4px 0;
            border-bottom: 1px solid #f1f5f9;
        }

        .ticket-card .row:last-child {
            border-bottom: none;
        }

        .ticket-card .label {
            color: #64748b;
            font-weight: 500;
        }

        .ticket-card .value {
            font-weight: 600;
        }

        .badge-priority {
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
        }

        .badge-priority.high {
            background: #fef2f2;
            color: #dc2626;
        }
        .badge-priority.medium {
            background: #fffbeb;
            color: #d97706;
        }
        .badge-priority.low {
            background: #f0fdf4;
            color: #16a34a;
        }
        .badge-priority.critical {
            background: #fee2e2;
            color: #b91c1c;
        }

        /* ===== TYPING INDICATOR ===== */
        .typing {
            align-self: flex-start;
            display: flex;
            gap: 4px;
            padding: 12px 16px;
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 16px;
            border-bottom-left-radius: 4px;
        }

        .typing span {
            width: 8px;
            height: 8px;
            background: #94a3b8;
            border-radius: 50%;
            animation: typing 1.4s infinite both;
        }

        .typing span:nth-child(2) {
            animation-delay: 0.2s;
        }
        .typing span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typing {
            0%,
            80%,
            100% {
                transform: scale(0.6);
                opacity: 0.4;
            }
            40% {
                transform: scale(1);
                opacity: 1;
            }
        }

        /* ===== INPUT AREA ===== */
        .input-area {
            padding: 16px 24px 24px;
            border-top: 1px solid #f1f5f9;
            background: #ffffff;
            flex-shrink: 0;
        }

        .input-wrapper {
            display: flex;
            gap: 10px;
            background: #f1f5f9;
            border-radius: 16px;
            padding: 4px 4px 4px 16px;
            align-items: center;
            border: 1px solid transparent;
            transition: border 0.2s;
        }

        .input-wrapper:focus-within {
            border-color: #3b82f6;
            background: #ffffff;
        }

        .input-wrapper input {
            flex: 1;
            border: none;
            background: transparent;
            padding: 10px 0;
            font-size: 14px;
            outline: none;
            color: #1e293b;
        }

        .input-wrapper input::placeholder {
            color: #94a3b8;
        }

        .input-wrapper button {
            background: #3b82f6;
            border: none;
            color: #ffffff;
            padding: 8px 16px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: background 0.2s;
            white-space: nowrap;
        }

        .input-wrapper button:hover {
            background: #2563eb;
        }

        .input-wrapper button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* ===== SUGGESTED QUESTIONS ===== */
        .suggestions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 12px;
            padding: 0 4px;
        }

        .suggestions button {
            background: #f1f5f9;
            border: none;
            border-radius: 20px;
            padding: 6px 14px;
            font-size: 12px;
            color: #475569;
            cursor: pointer;
            transition: background 0.2s;
        }

        .suggestions button:hover {
            background: #e2e8f0;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 540px) {
            .app {
                height: 100vh;
                border-radius: 0;
                max-width: 100%;
            }
            .header {
                padding: 16px 20px;
            }
            .messages {
                padding: 16px;
            }
            .input-area {
                padding: 12px 16px 16px;
            }
        }
    </style>
</head>
<body>

    <div class="app" id="app">
        <!-- Header -->
        <header class="header">
            <div class="header-left">
                <div class="avatar">AI</div>
                <div class="header-title">
                    24/7 AI Support
                    <span>Autonomous Customer Support Agent</span>
                </div>
            </div>
            <div class="header-right">
                <div class="status-badge">
                    <span class="dot"></span>
                    Online
                </div>
            </div>
        </header>

        <!-- Messages -->
        <div class="messages" id="messages">
            <!-- Welcome message -->
            <div class="message bot">
                <span class="bot-name">AI Support</span>
                <strong>👋 Hello! I'm your 24/7 AI Support Agent.</strong><br />
                I can help with account issues, billing, troubleshooting, and more. Just describe your problem and I'll get to work.
                <div class="meta">
                    <span class="tag">AI Support</span>
                    <span>Ready</span>
                </div>
            </div>
        </div>

        <!-- Input Area -->
        <div class="input-area">
            <div class="input-wrapper">
                <input
                    type="text"
                    id="userInput"
                    placeholder="Describe your issue..."
                    autocomplete="off"
                />
                <button id="sendBtn">Send</button>
            </div>
            <div class="suggestions">
                <button data-query="I can't log into my account">🔐 Login issue</button>
                <button data-query="I was charged twice for my subscription">💳 Billing issue</button>
                <button data-query="My dashboard is slow and not loading">⚡ Performance issue</button>
                <button data-query="I need help setting up my account">📝 Account setup</button>
            </div>
        </div>
    </div>

    <script>
        // ===========================
        // CONFIGURATION
        // ===========================

        // === UPDATE THESE VALUES FROM YOUR DEPLOYMENT ===
        const API_URL = 'https://tycon-ai-7f96b51d-312f-4190...'; // Replace with your actual URL
        const API_TOKEN = 'your-actual-token-here'; // Replace with your actual token

        // ===========================
        // DOM REFS
        // ===========================

        const messagesEl = document.getElementById('messages');
        const inputEl = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');

        // ===========================
        // HELPERS
        // ===========================

        function addMessage(text, sender) {
            const div = document.createElement('div');
            div.className = `message ${sender}`;
            div.innerHTML = text;
            messagesEl.appendChild(div);
            messagesEl.scrollTop = messagesEl.scrollHeight;
            return div;
        }

        function addTypingIndicator() {
            const div = document.createElement('div');
            div.className = 'typing';
            div.id = 'typing-indicator';
            div.innerHTML = `<span></span><span></span><span></span>`;
            messagesEl.appendChild(div);
            messagesEl.scrollTop = messagesEl.scrollHeight;
        }

        function removeTypingIndicator() {
            const el = document.getElementById('typing-indicator');
            if (el) el.remove();
        }

        function formatClassification(data) {
            if (!data || typeof data !== 'object') return '';
            const { category, priority, sentiment, issue_summary } = data;
            const priorityClass =
                priority?.toLowerCase() === 'critical' ? 'critical' :
                priority?.toLowerCase() === 'high' ? 'high' :
                priority?.toLowerCase() === 'medium' ? 'medium' : 'low';

            return `
                <div class="ticket-card">
                    <div class="row">
                        <span class="label">📋 Issue Summary</span>
                        <span class="value">${issue_summary || 'N/A'}</span>
                    </div>
                    <div class="row">
                        <span class="label">📂 Category</span>
                        <span class="value">${category || 'general'}</span>
                    </div>
                    <div class="row">
                        <span class="label">⚡ Priority</span>
                        <span class="value">
                            <span class="badge-priority ${priorityClass}">${priority || 'medium'}</span>
                        </span>
                    </div>
                    <div class="row">
                        <span class="label">😊 Sentiment</span>
                        <span class="value">${sentiment || 'neutral'}</span>
                    </div>
                </div>
            `;
        }

        function formatEscalation(escalationData) {
            if (!escalationData) return '';
            return `
                <div style="margin-top:8px;background:#fef2f2;border-left:3px solid #dc2626;padding:10px 14px;border-radius:6px;font-size:13px;">
                    <strong>🔔 Escalation Sent</strong><br/>
                    <span style="color:#64748b;">${escalationData}</span>
                </div>
            `;
        }

        function formatResponse(result) {
            let html = `<span class="bot-name">AI Support</span>`;

            if (result.classification) {
                html += `<strong>✅ Ticket Analyzed</strong><br/><br/>`;
                html += formatClassification(result.classification);
                html += `<br/>`;
            }

            if (result.draft_response) {
                html += `<strong>✏️ Draft Response</strong><br/>`;
                html += `<p style="margin-top:4px;">${result.draft_response}</p>`;
            }

            if (result.escalation) {
                html += formatEscalation(result.escalation);
            }

            if (result.analytics) {
                html += `
                    <div style="margin-top:8px;font-size:12px;color:#64748b;border-top:1px solid #e2e8f0;padding-top:8px;">
                        📈 ${result.analytics}
                    </div>
                `;
            }

            html += `
                <div class="meta">
                    <span class="tag">AI Support</span>
                    <span>Resolved</span>
                </div>
            `;

            return html;
        }

        // ===========================
        // CORE LOGIC
        // ===========================

        async function handleSend(query) {
            if (!query) {
                query = inputEl.value.trim();
                if (!query) return;
            }

            inputEl.value = '';
            sendBtn.disabled = true;

            // Show user message
            addMessage(query, 'user');

            // Show typing indicator
            addTypingIndicator();

            try {
                // Attempt to call the real API
                const response = await fetch(`${API_URL}/kickoff`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${API_TOKEN}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        customer_name: 'Customer',
                        channel: 'web',
                        ticket_text: query,
                        ticket_id: 'TICKET-' + Date.now(),
                        escalation_email: 'support@yourcompany.com',
                        slack_channel: '#support',
                        sheets_id: 'your-sheets-id',
                        customer_email: 'customer@email.com'
                    })
                });

                removeTypingIndicator();

                if (!response.ok) {
                    throw new Error(`API Error: ${response.status}`);
                }

                const result = await response.json();
                const botHtml = formatResponse(result);
                addMessage(botHtml, 'bot');

            } catch (err) {
                removeTypingIndicator();

                // FALLBACK: If API fails, use simulated response
                const result = simulateResponse(query);
                const botHtml = formatResponse(result);
                addMessage(botHtml, 'bot');

                // Show a small notice that we're using fallback
                const notice = document.createElement('div');
                notice.style.cssText = 'font-size:10px;color:#94a3b8;text-align:center;margin-top:4px;';
                notice.textContent = '⚠️ Using fallback mode (API not connected)';
                messagesEl.appendChild(notice);
                messagesEl.scrollTop = messagesEl.scrollHeight;

            } finally {
                sendBtn.disabled = false;
                inputEl.focus();
            }
        }

        // ===========================
        // SIMULATED RESPONSE (Fallback)
        // ===========================

        function simulateResponse(query) {
            const lower = query.toLowerCase();
            let classification = { category: 'general', priority: 'medium', sentiment: 'neutral', issue_summary: query.slice(0, 80) };
            let draft_response = 'Thank you for reaching out. I\'ve analyzed your request and will assist you shortly.';
            let escalation = null;
            let analytics = null;

            if (lower.includes('password') || lower.includes('login') || lower.includes('access')) {
                classification = { category: 'technical', priority: 'high', sentiment: 'negative', issue_summary: 'Account access issue reported' };
                draft_response = 'I can help you reset your password. Please check your email for a reset link. If you don\'t see it, check your spam folder.';
            } else if (lower.includes('billing') || lower.includes('charge') || lower.includes('refund') || lower.includes('subscription')) {
                classification = { category: 'billing', priority: 'high', sentiment: 'negative', issue_summary: 'Billing issue reported' };
                draft_response = 'I understand your concern about billing. Let me check your account details and get back to you with a resolution.';
            } else if (lower.includes('slow') || lower.includes('loading') || lower.includes('performance')) {
                classification = { category: 'technical', priority: 'medium', sentiment: 'neutral', issue_summary: 'Performance issue reported' };
                draft_response = 'I\'m sorry to hear you\'re experiencing slowness. Please try clearing your browser cache and cookies. If the issue persists, I\'ll escalate this to our technical team.';
            } else if (lower.includes('help') || lower.includes('urgent') || lower.includes('stuck')) {
                classification = { category: 'general', priority: 'critical', sentiment: 'negative', issue_summary: 'Urgent issue requiring immediate attention' };
                draft_response = 'I see this is urgent. I\'m escalating this to a senior agent who will reach out to you within 5 minutes.';
                escalation = 'Ticket escalated to senior support team via Slack and email.';
            } else {
                classification = { category: 'general', priority: 'medium', sentiment: 'neutral', issue_summary: 'General inquiry' };
                draft_response = 'Thank you for your message. Our support team will review your query and get back to you shortly.';
            }

            analytics = `Analytics logged. Knowledge gap identified: ${classification.category} topics need more documentation.`;

            return { classification, draft_response, escalation, analytics };
        }

        // ===========================
        // EVENT LISTENERS
        // ===========================

        sendBtn.addEventListener('click', () => handleSend());

        inputEl.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                handleSend();
            }
        });

        // Suggestions
        document.querySelectorAll('.suggestions button').forEach(btn => {
            btn.addEventListener('click', () => {
                const query = btn.dataset.query;
                handleSend(query);
            });
        });

        inputEl.focus();
    </script>
</body>
</html>
